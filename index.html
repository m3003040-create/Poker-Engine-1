<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Texas Hold'em Poker – 5 AI Opponents</title>
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="style.css">
    <!-- Подключение констант (порядок важен) -->
    <script src="constants_ranks.js"></script>
    <script src="constants_suits.js"></script>
    <script src="constants_handranks.js"></script>
    <script src="constants_phases.js"></script>
    <script src="constants_actions.js"></script>
    <!-- Конфигурация -->
    <script src="config_game.js"></script>
    <script src="config_ai.js"></script>
    <script src="config_ui.js"></script>
    <!-- Модели данных -->
    <script src="model_Card.js"></script>
    <script src="model_Deck.js"></script>
    <script src="model_Player.js"></script>
    <script src="model_HumanPlayer.js"></script>
    <script src="model_AIPlayer.js"></script>
    <script src="model_Pot.js"></script>
    <script src="model_GameState.js"></script>
    <!-- Контроллеры -->
    <script src="controller_Game.js"></script>
    <script src="controller_Betting.js"></script>
    <script src="controller_HandEvaluator.js"></script>
    <script src="controller_Winner.js"></script>
    <script src="controller_DeckManager.js"></script>
    <!-- Искусственный интеллект -->
    <script src="ai_Base.js"></script>
    <script src="ai_Tight.js"></script>
    <script src="ai_Aggressive.js"></script>
    <script src="ai_Random.js"></script>
    <script src="ai_Adaptive.js"></script>
    <script src="ai_Factory.js"></script>
    <script src="ai_HandStrength.js"></script>
    <!-- Отображение -->
    <script src="view_Game.js"></script>
    <script src="view_Card.js"></script>
    <script src="view_Player.js"></script>
    <script src="view_ActionButtons.js"></script>
    <script src="view_Pot.js"></script>
    <script src="view_Log.js"></script>
    <script src="view_SettingsModal.js"></script>
    <script src="view_Animation.js"></script>
    <!-- Утилиты -->
    <script src="util_helpers.js"></script>
    <script src="util_storage.js"></script>
    <script src="util_validation.js"></script>
    <script src="util_logger.js"></script>
    <!-- Точка входа -->
    <script src="main.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Игровой стол -->
        <div class="poker-table">
            <div class="table-felt"></div>
            <div class="dealer-button">D</div>
            <div class="pot-display">
                <span class="pot-label">Банк:</span>
                <span class="pot-amount" id="mainPotAmount">0</span>
            </div>
            <div class="community-cards" id="communityCardsArea">
                <!-- Общие карты будут добавлены динамически -->
                <div class="card-placeholder"></div>
                <div class="card-placeholder"></div>
                <div class="card-placeholder"></div>
                <div class="card-placeholder"></div>
                <div class="card-placeholder"></div>
            </div>
            <!-- Игроки (позиции) -->
            <div class="player-position" data-player-index="0" id="player0">
                <div class="player-avatar"></div>
                <div class="player-name">Вы</div>
                <div class="player-chips">1000</div>
                <div class="player-bet">0</div>
                <div class="player-cards"></div>
                <div class="player-status"></div>
            </div>
            <div class="player-position" data-player-index="1" id="player1">
                <div class="player-avatar"></div>
                <div class="player-name">AI Тайт</div>
                <div class="player-chips">1000</div>
                <div class="player-bet">0</div>
                <div class="player-cards"></div>
                <div class="player-status"></div>
            </div>
            <div class="player-position" data-player-index="2" id="player2">
                <div class="player-avatar"></div>
                <div class="player-name">AI Агро</div>
                <div class="player-chips">1000</div>
                <div class="player-bet">0</div>
                <div class="player-cards"></div>
                <div class="player-status"></div>
            </div>
            <div class="player-position" data-player-index="3" id="player3">
                <div class="player-avatar"></div>
                <div class="player-name">AI Случайный</div>
                <div class="player-chips">1000</div>
                <div class="player-bet">0</div>
                <div class="player-cards"></div>
                <div class="player-status"></div>
            </div>
            <div class="player-position" data-player-index="4" id="player4">
                <div class="player-avatar"></div>
                <div class="player-name">AI Адаптивный</div>
                <div class="player-chips">1000</div>
                <div class="player-bet">0</div>
                <div class="player-cards"></div>
                <div class="player-status"></div>
            </div>
            <div class="player-position" data-player-index="5" id="player5">
                <div class="player-avatar"></div>
                <div class="player-name">AI Агро2</div>
                <div class="player-chips">1000</div>
                <div class="player-bet">0</div>
                <div class="player-cards"></div>
                <div class="player-status"></div>
            </div>
        </div>

        <!-- Панель действий игрока -->
        <div class="action-panel" id="actionPanel">
            <button class="action-btn fold-btn" id="foldBtn" disabled>Фолд</button>
            <button class="action-btn check-btn" id="checkBtn" disabled>Чек</button>
            <button class="action-btn call-btn" id="callBtn" disabled>Колл</button>
            <button class="action-btn raise-btn" id="raiseBtn" disabled>Рейз</button>
            <button class="action-btn allin-btn" id="allinBtn" disabled>All-in</button>
            <div class="raise-slider-container" id="raiseSliderContainer" style="display: none;">
                <input type="range" id="raiseSlider" min="0" max="1000" step="10" value="100">
                <span id="raiseAmountDisplay">100</span>
            </div>
        </div>

        <!-- Лог событий -->
        <div class="game-log" id="gameLog">
            <div class="log-header">Лог игры</div>
            <div class="log-content" id="logContent">
                <div class="log-entry system">Добро пожаловать в Техасский Холдем!</div>
                <div class="log-entry system">Игра началась.</div>
            </div>
        </div>

        <!-- Кнопка настроек -->
        <button class="settings-button" id="settingsButton">⚙️</button>

        <!-- Модальное окно настроек -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2>Настройки игры</h2>
                <form id="settingsForm">
                    <label for="playerCount">Количество игроков (2-6):</label>
                    <input type="number" id="playerCount" min="2" max="6" value="6">

                    <label for="startChips">Стартовые фишки:</label>
                    <input type="number" id="startChips" min="500" max="10000" step="100" value="1000">

                    <label for="smallBlind">Малый блайнд:</label>
                    <input type="number" id="smallBlind" min="5" max="200" step="5" value="10">

                    <label for="bigBlind">Большой блайнд:</label>
                    <input type="number" id="bigBlind" min="10" max="400" step="10" value="20">

                    <label for="aiAggression">Агрессивность ИИ (1-10):</label>
                    <input type="range" id="aiAggression" min="1" max="10" step="1" value="5">
                    <span id="aiAggressionValue">5</span>

                    <label for="animationSpeed">Скорость анимации (мс):</label>
                    <input type="range" id="animationSpeed" min="0" max="1000" step="50" value="300">
                    <span id="animationSpeedValue">300</span>

                    <div class="modal-buttons">
                        <button type="button" id="saveSettingsBtn">Сохранить и перезапустить</button>
                        <button type="button" id="cancelSettingsBtn">Отмена</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Индикатор текущего этапа -->
        <div class="phase-indicator" id="phaseIndicator">Префлоп</div>

        <!-- Индикатор текущего игрока -->
        <div class="turn-indicator" id="turnIndicator">Ход: Вы</div>
    </div>

    <!-- Небольшой скрипт для начальной инициализации после загрузки всех модулей -->
    <script>
        // Ждём, пока DOM загрузится, и все скрипты инициализируются
        window.addEventListener('DOMContentLoaded', function() {
            // Проверка, что все глобальные классы и функции определены
            if (typeof window.PokerGame !== 'undefined' && window.PokerGame.init) {
                window.PokerGame.init();
            } else if (typeof window.main !== 'undefined' && window.main.init) {
                window.main.init();
            } else {
                console.warn('Точка входа не найдена. Возможно, main.js ещё не загружен.');
                // Резервный вариант: попробуем вызвать функцию из глобальной области
                if (typeof window.initGame === 'function') {
                    window.initGame();
                }
            }
        });
    </script>
</body>
</html>
